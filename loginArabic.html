<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>صفحه تسجيل دخول </title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="login-container">
  <h2>تسجيل دخول</h2>

  <form id="loginForm">
    <input type="email" id="email" placeholder=" عنوان البريد الالكتروني" required>

    <input type="password" id="password" placeholder="كلمة المرور" required>

    <button type="submit">تسجيل دخول</button>
  </form>
  <p style="color: #606060;" class="register-link">
    هل ليس لديك حساب؟
    <a href="register.html">إنشاء حساب</a>
  </p>
</div>

<script src="js/loginEn.js"></script>
</body>
</html>
